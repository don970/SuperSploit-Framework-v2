name: SuperSploit Framework CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC

jobs:
  # ===================================================================
  # CODE QUALITY & LINTING
  # ===================================================================
  lint:
    name: Code Linting & Quality Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install linting tools
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pylint isort black bandit safety
    
    - name: Run flake8 (PEP8 style check)
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 source/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 source/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      continue-on-error: true
    
    - name: Run pylint (Code analysis)
      run: |
        pylint source/ --fail-under=7.0 --disable=C,W --exit-zero
      continue-on-error: true
    
    - name: Check import sorting (isort)
      run: |
        isort --check-only --diff source/
      continue-on-error: true
    
    - name: Check code formatting (black)
      run: |
        black --check source/ --line-length=127
      continue-on-error: true
    
    - name: Security vulnerability scan (bandit)
      run: |
        bandit -r source/ -ll --json -o bandit-report.json
      continue-on-error: true
    
    - name: Check dependency vulnerabilities (safety)
      run: |
        safety check --json
      continue-on-error: true

  # ===================================================================
  # COMPREHENSIVE TEST SUITE
  # ===================================================================
  test:
    name: SuperSploit Core Audit Tests
    runs-on: ubuntu-latest
    needs: lint
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r setup/requirements.txt
    
    - name: Run SuperSploit Audit Suite
      run: |
        python tests/audit_core.py | tee test-results.log
      timeout-minutes: 15
      continue-on-error: true
    
    - name: Parse test results
      if: always()
      run: |
        python -c "
        import re
        with open('test-results.log', 'r') as f:
            content = f.read()
        
        # Extract pass/fail counts
        match = re.search(r'(\d+) Passed \| (\d+) Failed', content)
        if match:
            passed = int(match.group(1))
            failed = int(match.group(2))
            total = passed + failed
            percentage = (passed / total * 100) if total > 0 else 0
            
            print(f'::notice title=Test Results::Passed: {passed}/{total} ({percentage:.1f}%)')
            
            if failed > 0:
                print(f'::warning title=Failed Tests::Failed: {failed} tests')
                exit(1)
        "
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-${{ matrix.python-version }}
        path: test-results.log

  # ===================================================================
  # CODE COVERAGE ANALYSIS
  # ===================================================================
  coverage:
    name: Code Coverage Analysis
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r setup/requirements.txt
        pip install coverage pytest pytest-cov
    
    - name: Run coverage analysis
      run: |
        coverage run -m pytest tests/ --tb=short 2>/dev/null || true
        coverage report --skip-covered --skip-empty
        coverage xml
      continue-on-error: true
    
    - name: Upload to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: false
        verbose: true

  # ===================================================================
  # SECURITY SCANNING
  # ===================================================================
  security:
    name: Security & Vulnerability Scanning
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
    
    - name: OWASP Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'SuperSploit-Framework-v2'
        path: '.'
        format: 'JSON'
      continue-on-error: true

  # ===================================================================
  # DOCUMENTATION BUILD
  # ===================================================================
  docs:
    name: Documentation Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install documentation tools
      run: |
        python -m pip install --upgrade pip
        pip install sphinx sphinx-rtd-theme sphinx-autodoc-typehints
    
    - name: Build documentation
      run: |
        cd docs 2>/dev/null || mkdir -p docs
        sphinx-build -W -b html . _build/html 2>&1 || echo "Documentation build skipped (no docs/ directory)"
      continue-on-error: true

  # ===================================================================
  # BUILD & PACKAGE VALIDATION
  # ===================================================================
  build:
    name: Build & Package Validation
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel
    
    - name: Validate setup.py syntax
      run: |
        python -m py_compile setup/setup.py 2>/dev/null || echo "No setup.py found"
      continue-on-error: true
    
    - name: Check for common packaging issues
      run: |
        python -c "
        import os
        import sys
        
        checks = {
            'README.md': 'README file missing',
            'LICENSE': 'LICENSE file missing',
            'setup/requirements.txt': 'Requirements file missing'
        }
        
        for file, msg in checks.items():
            if not os.path.exists(file):
                print(f'⚠️  {msg}')
        
        print('✅ Basic packaging structure validated')
        "

  # ===================================================================
  # PERFORMANCE BENCHMARKING
  # ===================================================================
  benchmark:
    name: Performance Benchmarking
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r setup/requirements.txt
        pip install pytest-benchmark
    
    - name: Run performance benchmarks
      run: |
        python -c "
        import time
        import sys
        
        # Simple startup time benchmark
        start = time.time()
        sys.path.insert(0, 'source')
        try:
            from core.database import DatabaseManagment
            DatabaseManagment.get()
        except Exception as e:
            print(f'Benchmark skipped: {e}')
        
        elapsed = time.time() - start
        print(f'Framework initialization time: {elapsed*1000:.2f}ms')
        
        if elapsed > 5:
            print('⚠️  Warning: Slow startup detected')
        "
      continue-on-error: true

  # ===================================================================
  # FINAL STATUS CHECK
  # ===================================================================
  status:
    name: CI/CD Status Check
    runs-on: ubuntu-latest
    needs: [lint, test, security, build]
    if: always()
    
    steps:
    - name: Check workflow status
      run: |
        if [ "${{ needs.lint.result }}" = "failure" ] || \
           [ "${{ needs.test.result }}" = "failure" ] || \
           [ "${{ needs.security.result }}" = "failure" ] || \
           [ "${{ needs.build.result }}" = "failure" ]; then
          echo "❌ CI/CD Pipeline FAILED"
          exit 1
        else
          echo "✅ CI/CD Pipeline PASSED"
        fi
    
    - name: Generate summary report
      run: |
        cat > summary.md << 'EOF'
        # SuperSploit Framework v2 - CI/CD Report
        
        ## Status: ${{ job.status }}
        
        ### Test Results
        - Lint: ${{ needs.lint.result }}
        - Tests: ${{ needs.test.result }}
        - Security: ${{ needs.security.result }}
        - Build: ${{ needs.build.result }}
        
        ### Artifacts
        - Test logs available in Actions artifacts
        - Security reports uploaded to GitHub Security tab
        - Coverage reports available in Codecov
        
        **Generated**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
        EOF
        cat summary.md
    
    - name: Comment PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync('summary.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: summary
          });
      continue-on-error: true
